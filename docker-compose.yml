version: "3.8"

services:

  expense:
    build: .
    container_name: expense
    ports:
      - "9091:9090"
    environment:
      MYSQL_HOST: mysqldb
      MYSQL_PORT: 3306
      MYSQL_USERNAME:
      MYSQL_PASSWORD:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RabbitMQ_HOST: rabbitmq
      RabbitMQ_PORT: 5672
      RabbitMQ_USERNAME:
      RabbitMQ_PASSWORD:
    depends_on:
      - mysqldb
      - redis
      - rabbitmq
    networks:
      - expense-network

  mysqldb:
    image: mysql:8
    container_name: mysqldb
    environment:
      MYSQL_ROOT_PASSWORD:
      MYSQL_DATABASE: expense
    ports:
      - "3308:3306"
    networks:
      - expense-network

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - expense-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - expense-network

networks:
  expense-network: